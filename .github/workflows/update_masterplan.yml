name: Update Master Plan

on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of every month at midnight UTC
  workflow_dispatch:        # also triggerable manually from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-masterplan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull Master Plan GeoJSON
        run: python scripts/masterplan_pull.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/masterplan.geojson.gz
          git diff --staged --quiet || git commit -m "Update Master Plan data $(date +'%Y-%m-%d')"
          git push
